<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farm 🌾🌱</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('garden.static', filename='garden.css') }}">
</head>
<body>
    <nav class="navbar navbar-dark navbar-agri px-3 mb-4">
        <h3 class="m-0">🌿 Quản Lý Farm</h3>
        <a href="{{ url_for('login.log_out') }}" class="btn btn-light btn-sm">Đăng xuất</a>
    </nav>

    <div class="container mt-4">
        <!-- Add farm -->
        <div class="card card-agri shadow-sm p-4">
            <h4 class="farm-title mb-3">➕ Thêm Vườn Mới</h4>
            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label fw-bold">Loại Nấm</label>
                    <input type="text" id="namefarm" class="form-control" placeholder="Nhập Loại Nấm ..." required>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-bold">Mô tả</label>
                    <input type="text" id="description" class="form-control" placeholder="Mô tả ngắn...">
                </div>
 
                <div class="col-md-4 d-flex align-items-end">
                    <button class="btn farm-btn w-100" id="btnAdd">🌱 Thêm Vườn</button>
                </div>
            </div>
        </div>

        <!-- List farm -->
        <table class="table table-bordered mt-3" id="farmTable">
            <thead class="table-success">
                <tr>
                    <th style="width: 80px;">ID</th>
                    <th style="width: 200px;">Loại Nấm</th>
                    <th style="width: 50%;">Mô Tả</th>
                    <th style="width: 150px;">Thao tác</th>
                </tr>
            </thead>
            <tbody>
                {% for farm in all_farms %}
                    <tr data-id="{{ farm.id }}">
                        <td>{{ farm.id }}</td>
                        <td class="farm-name">{{ farm.ten_khu }}</td>
                        <td class="farm-desc">{{ farm.mo_ta }}</td>
                        <td>
                            <button class="btn btn-warning btn-sm btn-edit">Sửa</button>
                            <button class="btn btn-danger btn-sm btn-delete">Xóa</button>
                            <button class="btn btn-primary btn-sm btn-select">Chọn</button>
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <script src="{{ url_for('garden.static', filename='garden.js') }}"> </script>
</body>
</html>
