<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="text-success mb-0">
        <i class="bi bi-calendar-plus"></i> Thiết lập lịch tưới
    </h4>
</div>

<div class="card border-0 bg-light p-3 mb-4 shadow-sm">
    <div class="row g-3 align-items-end">
        <div class="col-md-7">
            <label class="form-label small fw-bold text-muted">
                CHỌN NGÀY & GIỜ TƯỚI:
            </label>
            <input type="datetime-local" id="schedule-time" class="form-control border-success">
        </div>
        <div class="col-md-5">
            <button class="btn btn-success w-100 fw-bold"
                    id="btn-save-wash"
                    data-id="{{ garden_id }}">
                <i class="bi bi-save"></i> LƯU LỊCH TƯỚI
            </button>
        </div>
    </div>
</div>

<div class="table-responsive">
    <table class="table table-hover align-middle border">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Thời gian</th>
                <th>Trạng thái</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody>
            {% for item in schedules %}
            <tr>
                <td>#{{ item['id'] }}</td>
                <td>{{ item['thoi_gian_tuoi'] }}</td>
                <td>
                    {% if item['trang_thai'] == 'chua_tuoi' %}
                        <span class="badge bg-warning text-dark">Chờ tưới</span>
                    {% else %}
                        <span class="badge bg-success">Đã hoàn thành</span>
                    {% endif %}
                </td>
                <td>
                    <!-- SỬA -->
                    <button class="btn btn-primary btn-sm btn-edit"
                            data-id="{{ item['id'] }}"
                            data-time="{{ item['thoi_gian_tuoi'] }}">
                        <i class="bi bi-pencil"></i>
                    </button>

                    <!-- XÓA -->
                    <button class="btn btn-danger btn-sm btn-delete"
                            data-id="{{ item['id'] }}">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="4" class="text-center text-muted py-4">
                    Chưa có lịch tưới
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
