<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Vườn - AgriFarm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --agri-green: #2d5a27; }
        body { background-color: #f8f9fa; }
        .navbar-agri { background-color: var(--agri-green); color: white; }
        .nav-link { color: rgba(255,255,255,0.8) !important; border-bottom: 3px solid transparent; }
        /* Sửa lỗi CSS fw-bold ở đây */
        .nav-link.active { color: #fff !important; border-bottom: 3px solid #ffeb3b; font-weight: bold; }
        .content-card { background: white; border-radius: 15px; min-height: 400px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-agri shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">🌿 KHU VƯỜN #{{ garden_id }}</a>
            <div class="navbar-nav">
                <a class="nav-link active" href="#" onclick="loadTab(event, 'sensor')">Dữ liệu môi trường</a>
                <a class="nav-link" href="#" onclick="loadTab(event, 'quantity')">Sản lượng nấm</a>
                <a class="nav-link" href="#" onclick="loadTab(event, 'schedule')">Lịch tưới</a>
            </div>
            <a href="/garden" class="btn btn-sm btn-outline-light">Quay lại</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div id="display-content" class="content-card">
            <div class="text-center p-5"><div class="spinner-border text-success"></div></div>
        </div>
    </div>

    <script src="{{ url_for('mushroom.static', filename='mushroom.js') }}"></script>
    <script src="{{ url_for('mushroom.static', filename='wash_cal.js') }}"></script>
    <script src="{{ url_for('mushroom.static', filename='number_mush.js') }}"></script>
</body>
</html>
