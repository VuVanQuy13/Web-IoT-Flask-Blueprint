<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="text-success mb-0"><i class="bi bi-broadcast"></i> Chỉ số môi trường thực tế</h4>
    <span class="badge bg-success text-white">Live Update</span>
</div>

{% if sensor %}
<div class="row g-4">
    <div class="col-md-4">
        <div class="card border-0 shadow-sm p-3 text-center" style="border-top: 5px solid #ff5252 !important;">
            <i class="bi bi-thermometer-half text-danger fs-1"></i>
            <div class="text-muted mt-2 small fw-bold">NHIỆT ĐỘ</div>
            <h2 class="mb-0">{{ sensor['nhiet_do'] }}°C</h2>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card border-0 shadow-sm p-3 text-center" style="border-top: 5px solid #2196f3 !important;">
            <i class="bi bi-droplet-fill text-primary fs-1"></i>
            <div class="text-muted mt-2 small fw-bold">ĐỘ ẨM</div>
            <h2 class="mb-0">{{ sensor['do_am'] }}%</h2>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card border-0 shadow-sm p-3 text-center" style="border-top: 5px solid #ffc107 !important;">
            <i class="bi bi-sun-fill text-warning fs-1"></i>
            <div class="text-muted mt-2 small fw-bold">ÁNH SÁNG</div>
            <h2 class="mb-0">{{ sensor['anh_sang'] }} lx</h2>
        </div>
    </div>
</div>

<div class="mt-4 p-2 bg-light rounded text-center small text-muted">
    <i class="bi bi-clock-history"></i> Log đã ghi vào Database lúc: {{ sensor['thoi_gian'] }}
</div>
{% else %}
<div class="alert alert-warning text-center">
    Chưa có dữ liệu cảm biến. Hệ thống đang khởi tạo...
</div>
{% endif %}
